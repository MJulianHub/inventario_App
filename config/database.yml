default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: inventario_app_development

test:
  <<: *default
  database: inventario_app_test

production:
  primary: &primary_production
    <<: *default
    database: inventario_app_production
    username: inventario_app
    password: <%= ENV["INVENTARIO_APP_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: inventario_app_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: inventario_app_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: inventario_app_production_cable
    migrations_paths: db/cable_migrate
